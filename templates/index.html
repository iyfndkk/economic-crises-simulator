<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ekonomik Krizler Simülasyonu</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100vh; overflow: hidden; background-color: #0f172a; font-family: sans-serif; }
        .container { display: flex; flex-direction: column; width: 100%; height: 100vh; }
        .panel { width: 100%; padding: 40px 60px; display: flex; flex-direction: column; justify-content: center; }
        .top-panel { flex: 1.2; background-color: #1e293b; border-bottom: 2px solid #334155; color: #f8fafc; overflow-y: auto; justify-content: flex-start; padding-top: 40px; }
        .bottom-panel { flex: 0.8; gap: 15px; position: relative; background-color: #0f172a; }
        
        .menu-bg-top { 
            background-image: linear-gradient(to bottom, rgba(30, 41, 59, 0.2), rgba(15, 23, 42, 0.95)), 
                              url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400"><path d="M0,250 L150,210 L300,260 L450,120 L600,180 L750,80 L900,140 L1000,90" fill="none" stroke="%2338bdf8" stroke-width="1.5" stroke-dasharray="4,4"/><rect x="135" y="190" width="30" height="40" fill="%2310b981" opacity="0.15"/><line x1="150" y1="170" x2="150" y2="250" stroke="%2310b981" stroke-width="2" opacity="0.3"/><rect x="285" y="210" width="30" height="50" fill="%23ef4444" opacity="0.15"/><line x1="300" y1="190" x2="300" y2="280" stroke="%23ef4444" stroke-width="2" opacity="0.3"/><rect x="435" y="120" width="30" height="90" fill="%2310b981" opacity="0.2"/><line x1="450" y1="100" x2="450" y2="230" stroke="%2310b981" stroke-width="2" opacity="0.4"/><rect x="585" y="140" width="30" height="40" fill="%23ef4444" opacity="0.15"/><line x1="600" y1="120" x2="600" y2="200" stroke="%23ef4444" stroke-width="2" opacity="0.3"/><rect x="735" y="80" width="30" height="100" fill="%2310b981" opacity="0.25"/><line x1="750" y1="60" x2="750" y2="200" stroke="%2310b981" stroke-width="2" opacity="0.5"/><circle cx="450" cy="120" r="5" fill="%23a855f7" opacity="0.7"/><circle cx="750" cy="80" r="5" fill="%2338bdf8" opacity="0.8"/></svg>');
            background-size: cover; background-position: center;
        }
        .menu-bg-bottom {
            background-image: linear-gradient(to top, rgba(15, 23, 42, 0.4), rgba(15, 23, 42, 0.95)),
                              url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" viewBox="0 0 1000 400"><line x1="0" y1="100" x2="1000" y2="100" stroke="%231e293b" stroke-width="1" stroke-dasharray="10,10"/><line x1="0" y1="250" x2="1000" y2="250" stroke="%231e293b" stroke-width="1" stroke-dasharray="10,10"/><path d="M50,300 C200,200 350,350 500,150 C650,200 800,50 950,120" fill="none" stroke="%2310b981" stroke-width="2" opacity="0.15"/><path d="M50,320 C180,250 280,380 480,220 C580,280 750,120 950,180" fill="none" stroke="%23ef4444" stroke-width="1.5" opacity="0.1"/></svg>');
            background-size: cover; background-position: center;
        }

        .header-title { font-size: 13px; font-weight: bold; color: #38bdf8; letter-spacing: 2px; margin-bottom: 15px; text-transform: uppercase; }
        .main-text { font-size: 17px; line-height: 1.6; white-space: pre-line; color: #e2e8f0; margin-bottom: 20px; }
        .info-box { background-color: #0f172a; border-left: 4px solid #10b981; border-radius: 6px; padding: 20px; font-size: 13px; color: #e2e8f0; line-height: 1.6; margin-bottom: 15px; white-space: pre-line; }
        .history-box { background-color: #0f172a; border-left: 4px solid #f59e0b; border-radius: 6px; padding: 20px; font-size: 13px; color: #fde047; line-height: 1.6; white-space: pre-line; }
        .menu-title { font-size: 42px; font-weight: bold; color: #ffffff; margin-bottom: 10px; letter-spacing: 1px; text-transform: uppercase; text-align: center; width: 100%; text-shadow: 0 4px 14px rgba(0,0,0,0.6); }
        .button-group { display: flex; gap: 20px; width: 100%; }
        .btn { flex: 1; background-color: #334155; color: #ffffff; border: 1px solid #475569; border-radius: 8px; padding: 20px; font-size: 14px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s ease; }
        .btn:hover { background-color: #0284c7; border-color: #38bdf8; transform: translateY(-3px); box-shadow: 0 4px 15px rgba(2, 132, 199, 0.4); }
        .btn-easy { border-bottom: 5px solid #10b981; }
        .btn-medium { border-bottom: 5px solid #f59e0b; }
        .btn-hard { border-bottom: 5px solid #ef4444; }
        .final-mode { background-color: #047857; border-color: #34d399; }
        .about-section { position: absolute; bottom: 20px; right: 20px; font-size: 11px; color: #475569; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; }
        .about-section:hover { color: #38bdf8; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(15, 23, 42, 0.85); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background-color: #1e293b; border: 2px solid #475569; border-radius: 12px; width: 480px; padding: 40px; text-align: center; color: #f8fafc; }
        .modal-title { font-size: 18px; font-weight: bold; color: #38bdf8; margin-bottom: 20px; }
        .modal-body { font-size: 14px; color: #e2e8f0; line-height: 1.6; margin-bottom: 25px; }
        .volume-slider { width: 100%; -webkit-appearance: none; background: #334155; height: 8px; border-radius: 5px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; background: #38bdf8; width: 20px; height: 20px; border-radius: 50%; }
        .close-modal-btn { background-color: #ef4444; color: white; border: none; padding: 12px 35px; font-size: 13px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 15px; }
        .lang-btn { background-color: #475569; border: 2px solid transparent; color: white; padding: 10px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; margin: 5px; }
        .lang-btn.active { border-color: #38bdf8; background-color: #0284c7; }
    </style>
</head>
<body>

    <audio id="bgMusic" src="/static/fon_muzigi.mp3" loop autoplay></audio>

    <div class="container" id="gameContainer"></div>

    <div id="settingsModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="lblSetTitle">🛠️ Simülasyon Ayarları</div>
            <div style="margin-bottom: 20px; font-weight: bold; font-size: 14px; color: #cbd5e1;" id="volLabel">🔊 ARKA PLAN MÜZİK SESİ: %50</div>
            <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.05" value="0.5" oninput="updateVolume(this.value)">
            
            <div style="margin-top: 30px; margin-bottom: 10px; font-weight: bold; font-size: 14px; color: #cbd5e1;" id="lblLangSelect">🌐 DİL SEÇİMİ / LANGUAGE:</div>
            <button class="lang-btn" id="btnLangTR" onclick="setLanguage('TR')">Türkçe</button>
            <button class="lang-btn" id="btnLangEN" onclick="setLanguage('EN')">English</button>
            <br>
            <button class="close-modal-btn" id="btnCloseSet" onclick="closeModal('settingsModal')">Kapat ve Dön</button>
        </div>
    </div>

    <div id="aboutModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-title" id="lblAboutTitle">💡 PROJE HAKKINDA</div>
            <div class="modal-body" id="lblAboutBody"></div>
            <button class="close-modal-btn" id="btnCloseAbout" onclick="closeModal('aboutModal')">Kapat ve Dön</button>
        </div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        let currentLang = localStorage.getItem('gameLang') || 'TR';
        let container = null;
        
        const uiText = {
            TR: {
                mainTitle: "🏛️ Ekonomik Krizler Simülasyonu", menuHead: "⚙️ ANA MENÜ ÜSSÜ", playBtn: "🎮 OYUNA BAŞLA", setBtn: "🛠️ AYARLAR",
                zorTitle: "⚡ ZORLUK SEVİYESİ BELİRLEYİN", zorHead: "🚨 SIMÜLASYON DÜZEYİ", kolay: "🟢 KOLAY MOD (3 Aşama)", orta: "🟡 ORTA MOD (4 Aşama)", zor: "🔴 ZOR MOD (6 Aşama)", back: "⬅️ ANA MENÜYE DÖN",
                setTitle: "🛠️ Simülasyon Ayarları", volText: "🔊 ARKA PLAN MÜZİK SESİ", langText: "🌐 DİL SEÇİMİ / LANGUAGE:", closeBtn: "Kapat ve Dön",
                aboutTitle: "💡 PROJE HAKKINDA", aboutDesc: "Kişilerin ekonomik olaylara karşı kendi bilgilerini ölçmelerini ve tazelemelerine yarayan bir uygulama.", devText: "Geliştiren:",
                gameOver: "🏆 SİMÜLASYON TAMAMLANDI", finalMetrics: "Final Makro Göstergeleriniz:", stateReport: "🏛️ ÜLKENİN GENEL SON DURUM RAPORU:", histParallel: "🏛️ LİTERATÜRDEN TARİHSEL GERÇEKLİK:",
                analizHead: "🏛️ KOMUTA MERKEZİ ANALİZİ // ", emirHead: "⚡ STRATEJİK EMİRLERİNİZ", stepText: "Aşama",
                infText: "Ülke piyasaları kontrolsüz likidite genişlemesi nedeniyle derin bir enflasyon sarmalına sürüklenmiş vaziyette. Paranın satın alma gücü erirken, halkın geçim endeksleri tarihi bir darbe aldı.",
                unempText: "Frene çok sert basılması sonucu üretim çarkları durma noktasına geldi. İstihdam piyasasında Okun Kanunu kriz sinyalleri veriyor, sokaklar yapısal işsiz kalan genç nüfusla dolu.",
                recText: "Ekonomi kalıcı bir durgunluk (resesyon) patikasına girdi. Yatırım iştahı tamamen bıçak gibi kesilirken, makroekonomik genel denge ciddi oranda sarsıldı.",
                stbText: "Makroekonomik dengeler başarıyla korundu! Enflasyon ve işsizlik doğal oranlarına yaklaştırılırken, piyasalara tam bir güven hakim kılındı. Genel denge modeli tıkır tıkır işliyor.",
                indicators: ["• Politika Faizi: %", "• Enflasyon Oranı (TÜFE): %", "• İşsizlik Oranı: %", "• GSYİH Büyüme Hızı: %"]
            },
            EN: {
                mainTitle: "🏛️ Economic Crises Simulator", menuHead: "⚙️ COMMAND CENTER HEADQUARTERS", playBtn: "🎮 START SIMULATION", setBtn: "🛠️ SETTINGS",
                zorTitle: "⚡ SELECT SIMULATION LEVEL", zorHead: "🚨 CRISIS THRESHOLD", kolay: "🟢 EASY MOD (3 Stages)", orta: "🟡 MEDIUM MOD (4 Stages)", zor: "🔴 HARD MOD (6 Stages)", back: "⬅️ BACK TO MAIN MENU",
                setTitle: "🛠️ Simulation Settings", volText: "🔊 BACKGROUND MUSIC VOLUME", langText: "🌐 LANGUAGE SELECTION:", closeBtn: "Close and Return",
                aboutTitle: "💡 ABOUT PROJECT", aboutDesc: "An application designed for individuals to measure and refresh their knowledge against real-world economic scenarios.", devText: "Developed by:",
                gameOver: "🏆 SIMULATION COMPLETED", finalMetrics: "Final Macroeconomic Indicators:", stateReport: "🏛️ COUNTRY'S GENERAL STATUS REPORT:", histParallel: "🏛️ HISTORICAL PARALLEL IN LITERATURE:",
                analizHead: "🏛️ COMMAND CENTER ANALYSIS // ", emirHead: "⚡ YOUR STRATEGIC COMMANDS", stepText: "Stage",
                infText: "The country's markets are engulfed in a deep inflationary spiral due to uncontrolled liquidity expansion. Purchasing power is eroding rapidly, delivering a historic blow to consumer indexes.",
                unempText: "Braking too hard has brought industrial production to a near-halt. The labor market signals crisis under Okun's Law; streets are filled with structurally unemployed youth.",
                recText: "The economy has entered a persistent and painful recessionary path. Capital investments have completely dried up, heavily destabilizing the macroeconomic equilibrium.",
                stbText: "Macroeconomic balances successfully maintained! Inflation and unemployment are optimized near natural rates, restoring absolute market confidence. The general equilibrium model works flawlessly.",
                indicators: ["• Policy Rate: %", "• Inflation Rate (CPI): %", "• Unemployment Rate: %", "• GDP Growth Rate: %"]
            }
        };

        const savedVolume = localStorage.getItem('gameVolume') || 0.5;
        music.volume = savedVolume;
        document.getElementById('volumeSlider').value = savedVolume;

        window.addEventListener('click', () => {
            if (music.paused) {
                music.play().catch(e => console.log("Ses hatası engeli aşıldı ag:", e));
            }
        }, { once: true });

        function updateVolume(val) {
            music.volume = val;
            document.getElementById('volLabel').innerText = `${uiText[currentLang].volText}: %${Math.round(val * 100)}`;
            localStorage.setItem('gameVolume', val);
        }

        function setLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('gameLang', lang);
            document.getElementById('btnLangTR').classList.toggle('active', lang === 'TR');
            document.getElementById('btnLangEN').classList.toggle('active', lang === 'EN');
            
            document.getElementById('lblSetTitle').innerText = uiText[lang].setTitle;
            document.getElementById('volLabel').innerText = `${uiText[lang].volText}: %${Math.round(music.volume * 100)}`;
            document.getElementById('lblLangSelect').innerText = uiText[lang].langText;
            document.getElementById('btnCloseSet').innerText = uiText[lang].closeBtn;
            document.getElementById('lblAboutTitle').innerText = uiText[lang].aboutTitle;
            document.getElementById('btnCloseAbout').innerText = uiText[lang].closeBtn;
            document.getElementById('lblAboutBody').innerHTML = `
                <p style="text-align: center; margin-bottom: 20px; font-weight: bold;">${uiText[lang].mainTitle}</p>
                <p style="color: #94a3b8; font-size: 13px; margin-bottom: 25px; text-align: center; border-bottom: 1px solid #334155; padding-bottom: 15px;">${uiText[lang].aboutDesc}</p>
                <div style="text-align: center;">${uiText[lang].devText}<br><span style="color: #38bdf8; font-weight: bold; font-size: 16px;">İsmail Yahya Fındık</span> & <span style="color: #a855f7; font-weight: bold; font-size: 16px;">Google AI</span></div>
            `;
            
            if(container) guncelDurumuCek();
        }

        function openModal(id) { document.getElementById(id).style.display = 'flex'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        function renderMenu() {
            container.innerHTML = `
                <div class="panel top-panel menu-bg-top" style="justify-content: center; align-items: center; border-bottom: none;">
                    <div class="menu-title">${uiText[currentLang].mainTitle}</div>
                </div>
                <div class="panel bottom-panel menu-bg-bottom">
                    <div class="header-title" style="text-align: center;">${uiText[currentLang].menuHead}</div>
                    <div class="button-group">
                        <button class="btn" onclick="renderZorlukSecim()">${uiText[currentLang].playBtn}</button>
                        <button class="btn" onclick="openModal('settingsModal')">${uiText[currentLang].setBtn}</button>
                    </div>
                    <div class="about-section" onclick="openModal('aboutModal')">ℹ️ ${currentLang === 'TR' ? 'HAKKINDA' : 'ABOUT'}</div>
                </div>
            `;
        }

        function renderZorlukSecim() {
            container.innerHTML = `
                <div class="panel top-panel menu-bg-top" style="justify-content: center; align-items: center; border-bottom: none;">
                    <div class="menu-title" style="font-size: 32px;">${uiText[currentLang].zorTitle}</div>
                </div>
                <div class="panel bottom-panel menu-bg-bottom">
                    <div class="header-title" style="text-align: center;">${uiText[currentLang].zorHead}</div>
                    <div class="button-group">
                        <button class="btn btn-easy" onclick="oyunuBaslat('kolay')">${uiText[currentLang].kolay}</button>
                        <button class="btn btn-medium" onclick="oyunuBaslat('orta')">${uiText[currentLang].orta}</button>
                        <button class="btn btn-hard" onclick="oyunuBaslat('zor')">${uiText[currentLang].zor}</button>
                    </div>
                    <button class="btn" style="background-color: #475569; margin-top: 10px; padding: 15px;" onclick="renderMenu()">${uiText[currentLang].back}</button>
                </div>
            `;
        }

        function oyunuBaslat(zorluk) {
            fetch(`/api/baslat/${zorluk}`).then(() => guncelDurumuCek());
        }

        // POLİTİKA SONU TUŞLARININ KİLİTLENMESİNİ BAĞIMSIZ ROTAYLA ÇÖZEN YENİ FONKSİYONLAR AG
        function yeniBaslangic() {
            fetch('/api/sifirla').then(() => renderZorlukSecim());
        }
        function menuyeDon() {
            fetch('/api/sifirla').then(() => renderMenu());
        }

        function guncelDurumuCek() {
            if (!container) return;
            fetch('/api/durum')
                .then(res => res.json())
                .then(data => {
                    if (data.menu_modu) {
                        renderMenu();
                        return;
                    }

                    if (data.game_over) {
                        let ulkeDurumu = "";
                        let tarihselOrnek = "";
                        
                        if (data.enflasyon > 13.5) {
                            ulkeDurumu = uiText[currentLang].infText;
                            tarihselOrnek = currentLang === 'TR' ? data.tarihsel_ornek_tr : data.tarihsel_ornek_en;
                        } else if (data.issizlik > 12.0) {
                            ulkeDurumu = uiText[currentLang].unempText;
                            tarihselOrnek = currentLang === 'TR' ? data.tarihsel_ornek_tr : data.tarihsel_ornek_en;
                        } else if (data.buyume < -2.0) {
                            ulkeDurumu = uiText[currentLang].recText;
                            tarihselOrnek = currentLang === 'TR' ? data.tarihsel_ornek_tr : data.tarihsel_ornek_en;
                        } else {
                            ulkeDurumu = uiText[currentLang].stbText;
                            tarihselOrnek = currentLang === 'TR' ? data.tarihsel_ornek_tr : data.tarihsel_ornek_en;
                        }

                        container.innerHTML = `
                            <div class="panel top-panel">
                                <div class="header-title">${uiText[currentLang].gameOver}</div>
                                <div class="main-text" style="font-size: 18px; text-align: center; margin-top: 15px; font-weight: bold;">
                                    ${uiText[currentLang].finalMetrics}<br>
                                    ${uiText[currentLang].indicators[0]}${data.faiz} | ${uiText[currentLang].indicators[1]}${data.enflasyon} | ${uiText[currentLang].indicators[2]}${data.issizlik} | ${uiText[currentLang].indicators[3]}${data.buyume}
                                </div>
                                <div class="info-box" style="margin-top: 25px;">
                                    <strong>${uiText[currentLang].stateReport}</strong><br><br>${ulkeDurumu}
                                </div>
                                <div class="history-box" style="margin-top: 15px;">
                                    <strong>${uiText[currentLang].histParallel}</strong><br><br>${tarihselOrnek}
                                </div>
                            </div>
                            <div class="panel bottom-panel">
                                <div class="header-title" style="text-align: center;">${currentLang === 'TR' ? 'POLİTİKA SONU' : 'END OF POLICY'}</div>
                                <div class="button-group">
                                    <button class="btn final-mode" onclick="menuyeDon()">👉 ${currentLang === 'TR' ? 'ANA MENÜYE DÖN' : 'RETURN TO MAIN MENU'}</button>
                                    <button class="btn final-mode" onclick="yeniBaslangic()">👉 ${currentLang === 'TR' ? 'YENİDEN BAŞLAT' : 'RESTART SIMULATION'}</button>
                                </div>
                            </div>
                        `;
                    } else {
                        let veri = data[currentLang];
                        let gostergePaneli = `\n\n📊 ${currentLang === 'TR' ? 'REEL MAKRO PARAMETRELER' : 'REAL MACRO PARAMETERS'}:\n${uiText[currentLang].indicators[0]}${data.faiz.toFixed(2)}\n${uiText[currentLang].indicators[1]}${data.enflasyon.toFixed(1)}\n${uiText[currentLang].indicators[2]}${data.issizlik.toFixed(1)}\n${uiText[currentLang].indicators[3]}${data.buyume.toFixed(1)}`;
                        
                        container.innerHTML = `
                            <div class="panel top-panel">
                                <div class="header-title">${uiText[currentLang].analizHead} ${veri.kriz_adi}</div>
                                <div class="main-text">${veri.rapor} ${gostergePaneli}</div>
                                <div class="info-box" style="border-left: 4px solid #a855f7;">${veri.sozluk}</div>
                            </div>
                            <div class="panel bottom-panel">
                                <div class="header-title" style="text-align: center;">${uiText[currentLang].emirHead} [${uiText[currentLang].stepText}: ${data.asama}/${data.toplam}]</div>
                                <div class="button-group">
                                    <button class="btn" onclick="kararVer('A')">👉 ${veri.A}</button>
                                    <button class="btn" onclick="kararVer('B')">👉 ${veri.B}</button>
                                    <button class="btn" onclick="kararVer('C')">👉 ${veri.C}</button>
                                </div>
                            </div>
                        `;
                    }
                })
                .catch(err => {
                    setTimeout(guncelDurumuCek, 400);
                });
        }

        function kararVer(secenek) {
            fetch(`/api/karar/${secenek}`).then(() => guncelDurumuCek());
        }

        window.addEventListener('DOMContentLoaded', () => {
            container = document.getElementById('gameContainer');
            setLanguage(currentLang);
        });
    </script>
</body>
</html>
